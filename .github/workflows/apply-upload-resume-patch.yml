name: Apply upload resume server patch

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/apply-upload-resume-patch.yml'

permissions:
  contents: write

jobs:
  patch-server:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Patch bat_server upload resume responses
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          import base64
          from pathlib import Path

          path = Path('bat_node_system/server/bat_server.py')
          text = path.read_text(encoding='utf-8')

          upload_init_b64 = ""
          upload_status_b64 = ""

          new_upload_init = base64.b64decode(upload_init_b64).decode('utf-8')
          new_upload_status = base64.b64decode(upload_status_b64).decode('utf-8')

          def replace_between(source: str, start_marker: str, end_marker: str, replacement: str) -> str:
              start = source.find(start_marker)
              if start < 0:
                  raise SystemExit(f'Missing start marker: {start_marker}')
              end = source.find(end_marker, start)
              if end < 0:
                  raise SystemExit(f'Missing end marker: {end_marker}')
              return source[:start] + replacement + '\n\n' + source[end:]

          text = replace_between(
              text,
              '@app.post("/v1/uploads/init")',
              '@app.put("/v1/uploads/{upload_id}/chunks/{chunk_index}")',
              new_upload_init,
          )
          text = replace_between(
              text,
              '@app.get("/v1/uploads/{upload_id}/status")',
              'def parse_wav(path: Path)',
              new_upload_status,
          )

          if 'already_received_chunks' in text:
              raise SystemExit('Old already_received_chunks response is still present')
          if '"received_chunk_count": len(received_chunks)' not in text:
              raise SystemExit('upload_init resume count was not applied')
          if '"received_chunk_count": len(received)' not in text:
              raise SystemExit('upload_status resume count was not applied')
          if '"missing_chunks": missing' in text or '"received_chunks": sorted(received)' in text:
              raise SystemExit('Bulky status arrays are still present')

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit server patch if needed
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- bat_node_system/server/bat_server.py; then
            echo "bat_server.py already patched"
            exit 0
          fi
          git diff -- bat_node_system/server/bat_server.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bat_node_system/server/bat_server.py
          git commit -m "Use compact upload resume metadata"
          git push
